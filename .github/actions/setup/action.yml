name: "Setup Gleam Environment"
description: "Thin wrapper around setup-gleam with monorepo-aware caching"

inputs:
  node:
    description: "Whether to setup Node.js for JavaScript target"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup Gleam
      uses: tylerbutler/actions/setup-gleam@1b043450f1919503d6c23e3ada9fc7aaa4e2a99b # ratchet:tylerbutler/actions/setup-gleam@main
      with:
        node: ${{ inputs.node }}
        # Disable built-in caching — it hashes a single gleam.toml in the working
        # directory, which doesn't work for our monorepo layout (packages/*/gleam.toml).
        # We add our own cache step below with the correct hashFiles() patterns.
        cache: "false"

    - name: Cache Gleam dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
      with:
        path: |
          build/packages
          ~/.cache/gleam
        # Hash all package manifests so the cache invalidates when any package
        # adds, removes, or changes a dependency.
        key: gleam-${{ runner.os }}-${{ hashFiles('gleam.toml', 'manifest.toml', 'packages/*/gleam.toml', 'packages/*/manifest.toml') }}
        restore-keys: gleam-${{ runner.os }}-
