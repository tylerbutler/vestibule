name: Changie Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read workspace
        id: ws
        uses: tylerbutler/actions/read-gleam-workspace@1b043450f1919503d6c23e3ada9fc7aaa4e2a99b # ratchet:tylerbutler/actions/read-gleam-workspace@main

      - name: Setup environment
        uses: ./.github/actions/setup

      - uses: tylerbutler/actions/changie-release@1b043450f1919503d6c23e3ada9fc7aaa4e2a99b # ratchet:tylerbutler/actions/changie-release@main
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          pr-title-template: 'release {version}'
          projects: ${{ steps.ws.outputs.projects }}
          version-files: |
            ${{ steps.ws.outputs.version-files }}
          post-batch-command: |
            echo "Refreshing lockfiles after version bumps..."
            gleam deps download
            for d in packages/vestibule_*/; do
              [ -f "$d/gleam.toml" ] && (cd "$d" && gleam deps download)
            done

      - name: Summary
        if: steps.release.outputs.skipped != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          PR_URL: ${{ steps.release.outputs.pr-url }}
          PR_OP: ${{ steps.release.outputs.pr-operation }}
          BATCHED: ${{ steps.release.outputs.batched-projects }}
        run: |
          echo "### Release PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Versions:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Batched projects:** $BATCHED" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR:** $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Operation:** $PR_OP" >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped
        if: steps.release.outputs.skipped == 'true'
        run: |
          echo "### Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No unreleased change fragments found." >> "$GITHUB_STEP_SUMMARY"
