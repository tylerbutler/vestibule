name: Publish

# Broad tag pattern so new packages added to workspace.toml are automatically
# publishable without editing this workflow. Safe because gleam-publish skips
# versions already on Hex and only publishes packages listed in workspace.toml.
on:
  push:
    tags:
      - '*-v*'

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Read workspace
        id: ws
        uses: tylerbutler/actions/read-gleam-workspace@9ead54248b2155caa3cf06eede183cf1bb08a809 # ratchet:tylerbutler/actions/read-gleam-workspace@main

      - name: Setup environment
        uses: ./.github/actions/setup

      # Publish packages in dependency order (from workspace.toml).
      # replace-path-deps rewrites `vestibule = { path = "../.." }` to Hex
      # version ranges derived from the root gleam.toml before publishing.
      - name: Publish to Hex.pm
        uses: tylerbutler/actions/gleam-publish@9ead54248b2155caa3cf06eede183cf1bb08a809 # ratchet:tylerbutler/actions/gleam-publish@main
        with:
          packages: ${{ steps.ws.outputs.packages }}
          replace-path-deps: |
            vestibule:gleam.toml
          hex-api-key: ${{ secrets.HEXPM_API_KEY }}

  # After publishing, update manifest.toml lockfiles so they reflect the
  # latest published versions. This keeps the repo in sync with Hex.
  update-lockfiles:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Refresh lockfiles
        run: |
          # Refresh manifest.toml in root and all sub-packages
          echo "Refreshing root manifest..."
          gleam deps download

          for pkg_dir in packages/vestibule_*/; do
            if [ -f "$pkg_dir/gleam.toml" ]; then
              echo "Refreshing $pkg_dir manifest..."
              (cd "$pkg_dir" && gleam deps download)
            fi
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- '*.toml'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No lockfile changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Lockfile changes detected:"
            git diff --stat -- '*.toml'
          fi

      - name: Create lockfile update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: |
          BRANCH="chore/update-lockfiles-${TAG}"
          git checkout -b "$BRANCH"
          git add -A '*.toml'
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: update lockfiles after ${TAG} publish"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update lockfiles after ${TAG} publish" \
            --body "Auto-generated PR to refresh \`manifest.toml\` lockfiles after publishing \`${TAG}\`." \
            --base main \
            --head "$BRANCH"
