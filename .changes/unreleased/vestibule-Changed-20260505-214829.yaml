body: '`Strategy.exchange_code` now returns `ExchangeResult(credentials, artifacts)`, and `Strategy.fetch_user` receives that exchange result so provider-specific token response artifacts can flow explicitly into user resolution. Providers with no artifacts can wrap credentials with `strategy.exchange_result(credentials)`.'
